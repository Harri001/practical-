<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>College Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:blue;
        }

        .sidebar{
            height:100vh;
            background:cyan;
            color:white;
            padding-top:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:green;
        }

        .card{
            border:none;
            border-radius:10px;
            box-shadow:0px 2px 8px rgba(0,0,0,0.1);
        }

        @media(max-width:768px){
            .sidebar{
                height:auto;
            }
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h3 class="text-center mb-4">Admin Panel</h3>

            <a href="#">Dashboard</a>
            <a href="#">Students</a>
            <a href="#">Courses</a>
            <a href="#">Exams</a>
            <a href="#">Results</a>
            <a href="#">Settings</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">College Admin Dashboard</h2>

            <!-- Cards -->
            <div class="row">

                <div class="col-md-3 mb-4">
                    <div class="card p-3 text-center">
                        <h5>Total Students</h5>
                        <h2>1200</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card p-3 text-center">
                        <h5>Total Courses</h5>
                        <h2>35</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card p-3 text-center">
                        <h5>Total Exams</h5>
                        <h2>18</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card p-3 text-center">
                        <h5>Pass Percentage</h5>
                        <h2>92%</h2>
                    </div>
                </div>

            </div>

            <!-- Table -->
            <div class="card p-4 mt-3">

                <h4 class="mb-3">Recent Results</h4>

                <div class="table-responsive">

                    <table class="table table-bordered table-hover">

                        <thead class="table-dark">
                            <tr>
                                <th>Student Name</th>
                                <th>Course</th>
                                <th>Marks</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>Rahul</td>
                                <td>BCA</td>
                                <td>85</td>
                                <td>Pass</td>
                            </tr>

                            <tr>
                                <td>Priya</td>
                                <td>MCA</td>
                                <td>78</td>
                                <td>Pass</td>
                            </tr>

                            <tr>
                                <td>Amit</td>
                                <td>BSc IT</td>
                                <td>65</td>
                                <td>Pass</td>
                            </tr>

                            <tr>
                                <td>Sneha</td>
                                <td>BBA</td>
                                <td>90</td>
                                <td>Excellent</td>
                            </tr>
                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
